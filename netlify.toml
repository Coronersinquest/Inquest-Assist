[build]
  base      = "."
  command   = "pnpm --filter @workspace/inquest-guide run build"
  publish   = "artifacts/inquest-guide/dist/public"

[build.environment]
  NODE_VERSION = "20"
  NODE_ENV     = "production"

# SPA fallback — send all routes to index.html so React Router handles them
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
