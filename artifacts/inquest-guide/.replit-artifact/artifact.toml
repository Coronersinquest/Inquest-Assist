kind = "web"
previewPath = "/"
title = "Inquest Preparation Guide"
version = "1.0.0"
id = "artifacts/inquest-guide"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20032
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/inquest-guide run dev"

[services.env]
PORT = "20032"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/inquest-guide", "run", "build"]
publicDir = "artifacts/inquest-guide/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
